<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% if page.title %}
  <title>{{ page.title }} - {{ site.title }}</title>
  {% else %}
  <title>{{ site.title }}</title>
  {% endif %}

  {% if page.excerpt %}
  <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
  {% elsif site.description %}
  <meta name="description" content="{{ site.description }}">
  {% endif %}

  <meta name="author" content="{{ site.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url | relative_url }}">
  {% if page.excerpt %}
  <meta property="og:description" content="{{ page.excerpt | strip_html | truncate: 200 }}">
  {% elsif site.description %}
  <meta property="og:description" content="{{ site.description }}">
  {% endif %}
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <link rel="canonical" href="{{ site.url }}{{ page.url | relative_url }}">

  <!-- Prism.js 代码高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>
  {% include header.html %}

  <!-- 阅读进度条 -->
  <div id="reading-progress" class="reading-progress"></div>

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- 返回顶部按钮 -->
  <button id="back-to-top" class="back-to-top" aria-label="返回顶部">↑</button>

  <!-- Prism.js -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
